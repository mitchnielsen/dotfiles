---
services:
  grafana:
    image: grafana/mcp-grafana
    container_name: mcp-grafana
    command: ["-t", "streamable-http", "--address", ":8000"]
    ports:
      - "8100:8000"
    environment:
      GRAFANA_URL: https://grafana.private.prefect.cloud/
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    restart: unless-stopped

  prometheus-dev:
    image: ghcr.io/pab1it0/prometheus-mcp-server:latest
    container_name: mcp-prometheus-dev
    ports:
      - "8103:8080"
    environment:
      PROMETHEUS_URL: https://prometheus.private.prefect.dev/
      PROMETHEUS_MCP_SERVER_TRANSPORT: http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  prometheus-stg:
    image: ghcr.io/pab1it0/prometheus-mcp-server:latest
    container_name: mcp-prometheus-stg
    ports:
      - "8104:8080"
    environment:
      PROMETHEUS_URL: https://prometheus.private.stg.prefect.dev/
      PROMETHEUS_MCP_SERVER_TRANSPORT: http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  prometheus-prd:
    image: ghcr.io/pab1it0/prometheus-mcp-server:latest
    container_name: mcp-prometheus-prd
    ports:
      - "8101:8080"
    environment:
      PROMETHEUS_URL: https://prometheus.private.prefect.cloud/
      PROMETHEUS_MCP_SERVER_TRANSPORT: http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      retries: 3
      timeout: 10s
      start_period: 5s
    restart: unless-stopped

  terraform:
    image: hashicorp/terraform-mcp-server:0.4.0
    container_name: mcp-terraform
    ports:
      - "8102:8080"
    environment:
      TFE_ADDRESS: "https://app.terraform.io"
      TFE_TOKEN: ${TFE_TOKEN}
      TRANSPORT_MODE: streamable-http
      TRANSPORT_HOST: 0.0.0.0
    restart: unless-stopped

  prefect-prd:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: mcp-prefect-prd
    command:
      - uvx
      - --from
      - prefect-mcp
      - python
      - -c
      - >-
        from prefect_mcp_server.server import mcp; mcp.run(transport="http", host="0.0.0.0", port=8000, path="/mcp")
    ports:
      - "8105:8000"
    environment:
      PREFECT_API_URL: ${PREFECT_PRD_API_URL}
      PREFECT_API_KEY: ${PREFECT_PRD_API_KEY}
    restart: unless-stopped

  prefect-dev:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: mcp-prefect-dev
    command:
      - uvx
      - --from
      - prefect-mcp
      - python
      - -c
      - >-
        from prefect_mcp_server.server import mcp; mcp.run(transport="http", host="0.0.0.0", port=8000, path="/mcp")
    ports:
      - "8106:8000"
    environment:
      PREFECT_API_URL: ${PREFECT_DEV_API_URL}
      PREFECT_API_KEY: ${PREFECT_DEV_API_KEY}
    restart: unless-stopped

  prefect-stg:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: mcp-prefect-stg
    command:
      - uvx
      - --from
      - prefect-mcp
      - python
      - -c
      - >-
        from prefect_mcp_server.server import mcp; mcp.run(transport="http", host="0.0.0.0", port=8000, path="/mcp")
    ports:
      - "8107:8000"
    environment:
      PREFECT_API_URL: ${PREFECT_STG_API_URL}
      PREFECT_API_KEY: ${PREFECT_STG_API_KEY}
    restart: unless-stopped
