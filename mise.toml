[settings]
dotfiles.root = "~/dotfiles"
dotfiles.default_mode = "symlink"
experimental = true

[bootstrap.macos.finder]
show_all_files = true
preferred_view_style = "list"

[bootstrap.macos.keyboard]
press_and_hold = false
initial_key_repeat = 15
key_repeat = 2

[bootstrap.macos.defaults]
"com.apple.dock" = { showhidden = true, "autohide-delay" = 0.0, "autohide-time-modifier" = 0, "no-bouncing" = true }
"NSGlobalDomain" = { AppleFontSmoothing = 0 }

[tasks.setup]
description = "Run full machine bootstrap"
run = '''
set -euo pipefail

if [ ! -f "$HOME/.personal_device_marker" ]; then
  mise -E work bootstrap --yes
else
  mise bootstrap --yes
fi
'''

[tasks.bootstrap]
description = "Run imperative post-bootstrap setup"
depends = ["homebrew:install", "macos:finalize", "ssh:permissions"]

[tasks."homebrew:install"]
description = "Install Homebrew and Brewfile packages (common + machine-specific)"
run = '''
set -euo pipefail

command -v brew >/dev/null 2>&1 || /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
touch "$HOME/.zprofile"
grep -q 'homebrew/bin/brew shellenv' "$HOME/.zprofile" || echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> "$HOME/.zprofile"
eval "$(/opt/homebrew/bin/brew shellenv)"

brew_dir="${MISE_PROJECT_ROOT:-$HOME/dotfiles}/.config/brew"
brew bundle install --file="$brew_dir/Brewfile"
'''

[tasks."homebrew:backup"]
description = "Snapshot the current Homebrew state for manual triage into Brewfile / Brewfile.work / Brewfile.personal"
run = '''
set -euo pipefail

eval "$(/opt/homebrew/bin/brew shellenv)"
out="${MISE_PROJECT_ROOT:-$HOME/dotfiles}/.config/brew/Brewfile.snapshot"
brew bundle dump --force --file="$out"
echo "Wrote $out. Run 'mise run homebrew:drift' to see just what's new, then move those entries into the right file by hand -- do not overwrite the tracked files directly."
'''

[tasks."homebrew:drift"]
description = "Diff installed Homebrew state against the tracked Brewfiles"
run = '''
set -euo pipefail

eval "$(/opt/homebrew/bin/brew shellenv)"
brew_dir="${MISE_PROJECT_ROOT:-$HOME/dotfiles}/.config/brew"

snapshot="$brew_dir/Brewfile.snapshot"
brew bundle dump --force --file="$snapshot"

installed=$(mktemp)
tracked=$(mktemp)
trap 'rm -f "$installed" "$tracked"' EXIT

brew bundle list --file="$snapshot" --all | sort -u > "$installed"
brew bundle list --file="$brew_dir/Brewfile" --all | sort -u > "$tracked"

echo "== Installed but not tracked in Brewfile (common + machine overlay) =="
comm -23 "$installed" "$tracked"

echo
echo "== Tracked but not currently installed =="
comm -13 "$installed" "$tracked"
'''

[tasks."macos:finalize"]
description = "Apply macOS settings that are not managed by mise defaults"
run = '''
set -euo pipefail

if [ "$(uname)" != "Darwin" ]; then
  exit 0
fi

chflags nohidden "$HOME/Library"
killall Dock >/dev/null 2>&1 || true
killall Finder >/dev/null 2>&1 || true
killall SystemUIServer >/dev/null 2>&1 || true
'''

[tasks."ssh:permissions"]
description = "Set SSH config permissions"
run = '''
set -euo pipefail

mkdir -p "$HOME/.ssh"
chmod 700 "$HOME/.ssh"
[ ! -e "$HOME/.ssh/config" ] || chmod 644 "$HOME/.ssh/config"
'''

