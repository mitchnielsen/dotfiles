# Worktrunk config
# https://worktrunk.dev

# Worktree path template: https://worktrunk.dev/config
worktree-path = "{{ repo_path }}/../{{ branch | sanitize }}"
skip-shell-integration-prompt = true

##########

# Worktree hooks: https://worktrunk.dev/hook

[post-start]
husky = """
case "{{ remote_url }}" in
  *PrefectHQ/horizon*|*prefecthq/horizon*)
    if [ -x "./scripts/setup-worktree" ]; then
      exit 0
    fi
    ;;
esac

if [ -d ".husky" ]; then
  npm install
fi
"""
pre-commit = """
if [ -f ".pre-commit-config.yaml" ]; then
  pre-commit install
fi
"""
direnv = """
case "{{ remote_url }}" in
  *PrefectHQ/horizon*|*prefecthq/horizon*)
    if [ -x "./scripts/setup-worktree" ]; then
      exit 0
    fi
    ;;
esac

if [ -f ".envrc" ]; then
  direnv allow
fi
"""

[pre-remove]
terraform-state-check = """
if [ -d './.terraform' ]; then
  echo 'Error: Terraform directory exists, aborting...'
  exit 1
fi
"""

[projects]

[projects."github.com/PrefectHQ/horizon".pre-start]
setup-worktree = """
if [ -x "./scripts/setup-worktree" ]; then
  ./scripts/setup-worktree
fi
"""
