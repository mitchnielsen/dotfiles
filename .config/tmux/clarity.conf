# clarity theme for tmux
# Source this file from your tmux.conf: source-file ~/.config/tmux/clarity.conf

set -g status-left "#[fg=#black]  #{?window_zoomed_flag,[🔍 #S:#W],[#S]} #[fg=#black]│"
set -g status-right "#[fg=#black]│ #[fg=#black]#(basename $(dirname '#{pane_current_path}'))/#{b:pane_current_path} "
setw -g window-status-format "#[fg=#black,bg=default] #I·#W "
setw -g window-status-current-format "#[fg=#0969da,bg=default,bold] #I·#W "
set -g pane-active-border-style "bg=default,fg=black"
set -g pane-border-style "bg=default,fg=#d0d7de"
set -g copy-mode-match-style "bg=#eaeef2"
set -g copy-mode-current-match-style "fg=#ffffff,bg=#0969da"
set -g status-style "bg=default,fg=#24292f"
set -g message-style "fg=#24292f,bg=#d8dee4"
set -g mode-style "fg=#24292f,bg=#d8dee4"
