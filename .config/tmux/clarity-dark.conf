# clarity-dark theme for tmux (GitHub Dark Default palette)
# Source this file from your tmux.conf: source-file ~/.config/tmux/clarity-dark.conf

set -g status-left "#[fg=#e6edf3]  #{?window_zoomed_flag,[🔍 #S:#W],[#S]} #[fg=#e6edf3]│"
set -g status-right "#[fg=#e6edf3]│ #[fg=#e6edf3]#(basename $(dirname '#{pane_current_path}'))/#{b:pane_current_path} "
setw -g window-status-format "#[fg=#e6edf3,bg=default] #I·#W "
setw -g window-status-current-format "#[fg=#2f81f7,bg=default,bold] #I·#W "
set -g pane-active-border-style "bg=default,fg=#e6edf3"
set -g pane-border-style "bg=default,fg=#30363d"
set -g copy-mode-match-style "bg=#1f2733"
set -g copy-mode-current-match-style "fg=#ffffff,bg=#2f81f7"
set -g status-style "bg=default,fg=#e6edf3"
set -g message-style "fg=#e6edf3,bg=#264f78"
set -g mode-style "fg=#e6edf3,bg=#264f78"
