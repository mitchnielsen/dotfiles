# clarity-dark theme for k9s (GitHub Dark Default palette)
# Matches clarity-dark.lua nvim colorscheme + ghostty clarity-dark

foreground: &foreground "#e6edf3"
background: &background default
primary: &primary "#2f81f7"
secondary: &secondary "#3fb950"
warning: &warning "#d29922"
error: &error "#f85149"
muted: &muted "#7d8590"
border: &border "#30363d"
highlight: &highlight "#264f78"
faint: &faint "#484f58"

k9s:
  body:
    fgColor: *foreground
    bgColor: *background
    logoColor: *muted
  prompt:
    fgColor: *foreground
    bgColor: *background
    suggestColor: *primary
  info:
    fgColor: *muted
    sectionColor: *foreground
  help:
    fgColor: *foreground
    bgColor: *background
    keyColor: *primary
    numKeyColor: *primary
    sectionColor: *foreground
  dialog:
    fgColor: *foreground
    bgColor: *background
    buttonFgColor: "#ffffff"
    buttonBgColor: *primary
    buttonFocusFgColor: *foreground
    buttonFocusBgColor: *highlight
    labelFgColor: *foreground
    fieldFgColor: *foreground
  frame:
    border:
      fgColor: *border
      focusColor: *primary
    menu:
      fgColor: *muted
      keyColor: *primary
      numKeyColor: *primary
    crumbs:
      fgColor: "#ffffff"
      bgColor: *primary
      activeColor: *secondary
    status:
      newColor: *secondary
      modifyColor: *primary
      addColor: *secondary
      pendingColor: *warning
      errorColor: *error
      highlightColor: *warning
      killColor: *error
      completedColor: *muted
    title:
      fgColor: *foreground
      bgColor: *background
      highlightColor: *primary
      counterColor: *muted
      filterColor: *primary
  views:
    charts:
      bgColor: *background
      defaultDialColors:
        - *secondary
        - *error
      defaultChartColors:
        - *primary
        - *secondary
        - *warning
        - *error
    table:
      fgColor: *foreground
      bgColor: *background
      cursorFgColor: "#ffffff"
      cursorBgColor: *highlight
      markColor: *primary
      header:
        fgColor: *muted
        bgColor: *background
        sorterColor: *primary
    xray:
      fgColor: *foreground
      bgColor: *background
      cursorColor: *primary
      graphicColor: *muted
      showIcons: false
    yaml:
      keyColor: *foreground
      colonColor: *muted
      valueColor: *secondary
    logs:
      fgColor: *foreground
      bgColor: *background
      indicator:
        fgColor: *primary
        bgColor: *background
        toggleOnColor: *secondary
        toggleOffColor: *muted
    help:
      fgColor: *foreground
      bgColor: *background
      indicator:
        fgColor: *primary
